<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnhHeang Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Premium #21B2FF Electric Gradient Background */
            background: radial-gradient(circle at top right, #21B2FF 0%, #0d223a 50%, #070a12 100%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Glassmorphism Profile Card Container */
        .profile-container {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px 30px;
            border-radius: 24px;
            border: 1px solid rgba(33, 178, 255, 0.25); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
        }

        /* 100x Cooler Main Title */
        .profile-info h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 30%, #21B2FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(33, 178, 255, 0.3);
            margin-bottom: 10px;
        }

        /* Sleek Subtitle */
        .profile-info p {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
        }

        /* Glowing Theme-Matched Avatar Frame */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 2px solid rgba(33, 178, 255, 0.4);
            box-shadow: 0 0 20px rgba(33, 178, 255, 0.3);
            position: relative;
            overflow: hidden; /* Keeps the profile photo perfectly inside the circle */
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        /* Profile Image Styling */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures portrait photos do not warp or flatten */
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(33, 178, 255, 0.2); border-color: rgba(33, 178, 255, 0.3); }
            50% { box-shadow: 0 0 35px rgba(33, 178, 255, 0.6); border-color: rgba(33, 178, 255, 0.7); }
        }

        /* Links Layout */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* The Premium Cyber Buttons */
        .social-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            padding: 14px 24px;
            border-radius: 16px;
            background: rgba(7, 10, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Arrow Indicator on the right edge */
        .social-link::after {
            content: '\f061';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 24px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        /* Icons Container */
        .social-link i {
            font-size: 1.6rem;
            width: 40px;
            text-align: left;
            transition: transform 0.3s ease;
        }

        /* Custom Roblox SVG Icon styling */
        .roblox-svg-icon {
            width: 24px;
            height: 24px;
            margin-right: 16px;
            fill: currentColor;
            transform: rotate(-14deg); /* Perfectly mimics the tilted image logo */
            transition: transform 0.3s ease, fill 0.3s ease, filter 0.3s ease;
        }

        /* Text Block Styling */
        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        /* Futuristic Tactical Username (Top line) */
        .username {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
            transition: color 0.3s ease;
        }

        /* Cyber-Glow Application Title (Bottom line) */
        .app-name {
            font-weight: 700;
            font-size: 1.15rem;
            color: #cbd5e1;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        /* Powerful Brand Hover Glows & Color Alterations */
        .social-link:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.04);
        }

        .social-link:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .social-link:hover i {
            transform: scale(1.15);
        }

        .social-link:hover .roblox-svg-icon {
            transform: rotate(-14deg) scale(1.15);
        }

        /* Instantly brightens text styles on layout focus */
        .social-link:hover .username {
            color: rgba(255, 255, 255, 0.6);
        }

        .social-link:hover .app-name {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Custom variables mapped to each link for individual brand glow */
        .facebook:hover { border-color: #1877F2; box-shadow: 0 10px 25px rgba(24, 119, 242, 0.35); }
        .facebook:hover i { color: #1877F2; }
        .facebook:hover .app-name { text-shadow: 0 0 10px rgba(24, 119, 242, 0.6); }

        .tiktok:hover { border-color: #00f2fe; box-shadow: 0 10px 25px rgba(0, 242, 254, 0.25); }
        .tiktok:hover i { color: #fe2c55; text-shadow: 2px 2px #00f2fe; }
        .tiktok:hover .app-name { text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }

        .discord:hover { border-color: #5865F2; box-shadow: 0 10px 25px rgba(88, 101, 242, 0.35); }
        .discord:hover i { color: #5865F2; }
        .discord:hover .app-name { text-shadow: 0 0 10px rgba(88, 101, 242, 0.6); }

        .instagram:hover { border-color: #dc2743; box-shadow: 0 10px 25px rgba(220, 39, 67, 0.35); }
        .instagram:hover i { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .instagram:hover .app-name { text-shadow: 0 0 10px rgba(220, 39, 67, 0.6); }

        .github:hover { border-color: #ffffff; box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2); }
        .github:hover i { color: #ffffff; }
        .github:hover .app-name { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }

        .roblox:hover { border-color: #E2231A; box-shadow: 0 10px 25px rgba(226, 35, 26, 0.35); }
        .roblox:hover .roblox-svg-icon { fill: #E2231A; filter: drop-shadow(0 0 8px rgba(226, 35, 26, 0.6)); }
        .roblox:hover .app-name { text-shadow: 0 0 10px rgba(226, 35, 26, 0.6); }
    </style>
