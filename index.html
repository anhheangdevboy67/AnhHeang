<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnhHeang Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at top right, #21B2FF 0%, #0d223a 50%, #070a12 100%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Glassmorphism Profile Card Container */
        .profile-container {
            background: rgba(10, 18, 32, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px 20px 25px 20px;
            border-radius: 24px;
            border: 1px solid rgba(33, 178, 255, 0.25); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* Main Title */
        .profile-info h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 30%, #21B2FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(33, 178, 255, 0.3);
            margin-bottom: 6px;
        }

        /* Sleek Subtitle */
        .profile-info p {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* Glowing Theme-Matched Avatar Frame */
        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            border: 2px solid rgba(33, 178, 255, 0.4);
            box-shadow: 0 0 20px rgba(33, 178, 255, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        /* Profile Image Styling */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 18px rgba(33, 178, 255, 0.2); border-color: rgba(33, 178, 255, 0.3); }
            50% { box-shadow: 0 0 30px rgba(33, 178, 255, 0.5); border-color: rgba(33, 178, 255, 0.7); }
        }

        /* ================= MUSIC PLAYER STYLES ================= */
        .music-player {
            background: rgba(7, 10, 18, 0.4);
            border: 1px solid rgba(33, 178, 255, 0.15);
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(33, 178, 255, 0.05);
        }

        .track-info {
            text-align: left;
            margin-bottom: 8px;
        }

        .track-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 1px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #21B2FF;
            width: 32px;
        }

        .progress-bar-wrapper {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #21B2FF, #00f2fe);
            border-radius: 3px;
            box-shadow: 0 0 8px #21B2FF;
            position: relative;
            transition: width 0.1s linear;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #cbd5e1;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 8px;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.play-btn {
            font-size: 1.4rem;
            color: #ffffff;
            width: 42px;
            height: 42px;
            background: rgba(33, 178, 255, 0.1);
            border: 1px solid rgba(33, 178, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(33, 178, 255, 0.1);
            padding: 0;
        }

        /* Links Layout */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Cyber Buttons */
        .social-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            padding: 12px 18px;
            border-radius: 16px;
            background: rgba(7, 10, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .social-link::after {
            content: '\f061';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 18px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .social-link i {
            font-size: 1.4rem;
            width: 35px;
            text-align: left;
            transition: transform 0.3s ease;
        }

        .roblox-svg-icon {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            fill: currentColor;
            transform: rotate(-14deg);
            transition: transform 0.3s ease, fill 0.3s ease, filter 0.3s ease;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .username {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 1px;
            margin-bottom: 2px;
            transition: color 0.3s ease;
        }

        .app-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: #cbd5e1;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .social-link:hover, .social-link:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .social-link:hover::after { opacity: 1; transform: translateX(0); }
        .social-link:hover i { transform: scale(1.1); }
        .social-link:hover .roblox-svg-icon { transform: rotate(-14deg) scale(1.1); }
        .social-link:hover .username { color: rgba(255, 255, 255, 0.6); }
        .social-link:hover .app-name { color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }

        /* Brand Colors mapping */
        .facebook:hover, .facebook:active { border-color: #1877F2; box-shadow: 0 8px 20px rgba(24, 119, 242, 0.3); }
        .facebook:hover i { color: #1877F2; }
        .facebook:hover .app-name { text-shadow: 0 0 10px rgba(24, 119, 242, 0.6); }

        .tiktok:hover, .tiktok:active { border-color: #00f2fe; box-shadow: 0 8px 20px rgba(0, 242, 254, 0.2); }
        .tiktok:hover i { color: #fe2c55; text-shadow: 2px 2px #00f2fe; }
        .tiktok:hover .app-name { text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }

        .discord:hover, .discord:active { border-color: #5865F2; box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3); }
        .discord:hover i { color: #5865F2; }
        .discord:hover .app-name { text-shadow: 0 0 10px rgba(88, 101, 242, 0.6); }

        .instagram:hover, .instagram:active { border-color: #dc2743; box-shadow: 0 8px 20px rgba(220, 39, 67, 0.3); }
        .instagram:hover i { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .instagram:hover .app-name { text-shadow: 0 0 10px rgba(220, 39, 67, 0.6); }

        .github:hover, .github:active { border-color: #ffffff; box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15); }
        .github:hover i { color: #ffffff; }
        .github:hover .app-name { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }

        .roblox:hover, .roblox:active { border-color: #E2231A; box-shadow: 0 8px 20px rgba(226, 35, 26, 0.3); }
        .roblox:hover .roblox-svg-icon { fill: #E2231A; filter: drop-shadow(0 0 8px rgba(226, 35, 26, 0.6)); }
        .roblox:hover .app-name { text-shadow: 0 0 10px rgba(226, 35, 26, 0.6); }

        @media (max-width: 360px) {
            .profile-container { padding: 25px 15px 20px 15px; }
            .profile-info h1 { font-size: 1.4rem; }
            .app-name { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-info">
            <div class="avatar">
                <img src="avatar.jpg" alt="AnhHeang Profile">
            </div>
            <h1>AnhHeang Social</h1>
            <p>blehh blehh</p>
        </div>

        <div class="music-player">
            <audio id="audio-element" src="song1.mp3" preload="metadata"></audio>
            
            <div class="track-info">
                <div class="track-name" id="track-title">Loading Song...</div>
                <div class="track-artist" id="track-author">Cyber Soundscape</div>
            </div>

            <div class="progress-container">
                <span class="time-display" id="time-current">0:00</span>
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar-fill" id="progress-fill"></div>

            </div>

            <div class="player-controls">
                <button class="control-btn" id="btn-prev" title="Previous Track"><i class="fa-solid fa-backward-step"></i></button>
                <button class="control-btn play-btn" id="btn-play" title="Play/Pause"><i class="fa-solid fa-play" id="play-icon"></i></button>
                <button class="control-btn" id="btn-next" title="Skip Track"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>

        <div class="links-container">
            <a href="https://web.facebook.com/AnhHeang.zzz/" target="_blank" class="social-link facebook">
                <i class="fa-brands fa-facebook-f"></i>
                <div class="text-group">

                </div>
            </a>

            <a href="https://www.tiktok.com/@jobmgjobmg?lang=en-GB" target="_blank" class="social-link tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <div class="text-group">
                    <span class="username">@.Heang</span>
                    <span class="app-name">TikTok</span>
                </div>
            </a>

            <a href="https://discord.com/channels/@me/1297759827635863594" target="_blank" class="social-link discord">
                <i class="fa-brands fa-discord"></i>
                <div class="text-group">
                    <span class="username">@AnhHeang</span>
                    <span class="app-name">Discord</span>
                </div>
            </a>

            <a href="https://www.instagram.com/anhheang168/" target="_blank" class="social-link instagram">
                <i class="fa-brands fa-instagram"></i>
                <div class="text-group">
                    <span class="username">@.Heang</span>
                    <span class="app-name">Instagram</span>
                </div>
            </a>

            <a href="https://github.com/anhheangdevboy67" target="_blank" class="social-link github">
                <i class="fa-brands fa-github"></i>
                <div class="text-group">
                    <span class="username">@anhheangdevboy67</span>
                    <span class="app-name">GitHub</span>
                </div>
            </a>

            <a href="https://www.roblox.com/users/10863994224/profile" target="_blank" class="social-link roblox">
                <svg class="roblox-svg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0H24V24H0V0ZM4.5 4.5V19.5H19.5V4.5H4.5ZM9.5 9.5H14.5V14.5H9.5V9.5Z" />
                </svg>
                <div class="text-group">
                    <span class="username">@AnhHeang</span>
                    <span class="app-name">Roblox</span>
                </div>
            </a>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "Smoke", artist: "Tena", src: "song1.mp3" },
            { title: "HOYOS", artist: "TEP PISETH", src: "song2.mp3" },
            { title: "1week 7day", artist: "Suly Pheng", src: "song3.mp3" }
        ];

        let currentTrackIndex = 0;

        const audio = document.getElementById('audio-element');
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        const trackTitle = document.getElementById('track-title');
        const trackAuthor = document.getElementById('track-author');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const progressFill = document.getElementById('progress-fill');
        const progressWrapper = document.getElementById('progress-wrapper');

        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.src;
            trackTitle.textContent = track.title;
            trackAuthor.textContent = track.artist;
            progressFill.style.width = '0%';
            timeCurrent.textContent = '0:00';
        }

        loadTrack(currentTrackIndex);

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio play blocked."));
                playIcon.className = "fa-solid fa-pause";
            } else {
                audio.pause();
                playIcon.className = "fa-solid fa-play";
            }
        }

        playBtn.addEventListener('click', togglePlay);

        // ================= AUTOMATIC PLAYLOGIC FOR VISITORS =================
        // Attempts to safely trigger autoplay if permitted, otherwise registers a listener
        function attemptAutoplay() {
            audio.play().then(() => {
                playIcon.className = "fa-solid fa-pause";
                removeAutoplayListeners();
            }).catch(() => {
                // Autoplay blocked by browser. Wait for user gesture on document object.
                document.addEventListener('click', forcePlayOnGesture);
                document.addEventListener('touchstart', forcePlayOnGesture);
            });
        }

        function forcePlayOnGesture() {
            audio.play().then(() => {
                playIcon.className = "fa-solid fa-pause";
                removeAutoplayListeners();
            }).catch(e => console.log(e));
        }

        function removeAutoplayListeners() {
            document.removeEventListener('click', forcePlayOnGesture);
            document.removeEventListener('touchstart', forcePlayOnGesture);
        }

        // Initialize attempt after element bindings finish
        window.addEventListener('DOMContentLoaded', attemptAutoplay);
        // ====================================================================

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(currentTrackIndex);
            audio.play().then(() => playIcon.className = "fa-solid fa-pause").catch(() => playIcon.className = "fa-solid fa-play");
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            audio.play().then(() => playIcon.className = "fa-solid fa-pause").catch(() => playIcon.className = "fa-solid fa-play");
        });

        function formatMinutes(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            timeTotal.textContent = formatMinutes(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percentage}%`;
                timeCurrent.textContent = formatMinutes(audio.currentTime);
            }
        });

        audio.addEventListener('ended', () => {
            nextBtn.click();
        });

        progressWrapper.addEventListener('click', (e) => {
            const width = progressWrapper.clientWidth;
            const clickX = e.offsetX;
            if (audio.duration) {
                audio.currentTime = (clickX / width) * audio.duration;
            }
        });
    </script>
</body>
</html>
